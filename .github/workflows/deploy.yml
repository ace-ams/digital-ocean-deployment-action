name: Deploy to DigitalOcean

on:
  workflow_call:
    secrets:
      DIGITALOCEAN_API_TOKEN:
        required: true

jobs:
  deploy:
    if: ${{ !failure() }}
    runs-on: ubuntu-latest
    environment: ${{ github.ref_type == 'tag' && 'production' || 'acceptance' }}
    steps:
      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_API_TOKEN }}
      - name: Update DigitalOcean App tags
        if: github.ref_type == 'tag'
        run: |
          repository=$(echo ${{ github.repository }} | sed -E "s/ace-ams\///")-prd
          app_id=$(doctl apps list | grep $repository | awk '{print $1}')
          if [[ $app_id ]]; then doctl apps spec get $app_id | sed -E "/tag: (cms|cms-cli|app|migration)/ s/[0-9]+.[0-9]+.[0-9]+/${{ github.ref_name }}/" | sed -E "/key: VERSION$/,+2 s/value: .*/value: ${{ github.ref_name }}/" | doctl apps update $app_id --spec=-; fi
      - name: Create new deployment
        if: github.ref_name == 'main' || github.ref_name == 'master'
        run: |
          repository=$(echo ${{ github.repository }} | sed -E "s/ace-ams\///")-acc
          app_id=$(doctl apps list | grep $repository | awk '{print $1}')
          if [[ $app_id ]]; then doctl apps create-deployment $app_id --force-rebuild; fi
